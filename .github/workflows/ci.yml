name: CI

on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.os }} / Node ${{ matrix.node }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      # Typecheck is required as of v1.5.2 Phase 01.
      # Lint is required as of v1.5.2 Phase 02.
      # Format check is required as of v1.5.2 Phase 03.
      # Test is required as of v3 M1 PR-11 Task A. Plan 01-03 PR-11 Task A
      # remediates the 33 v2.3.5 carry-forward failures (fix / fixture-drift
      # / skip-with-issue / obsolete-delete); after that PR, `continue-on-error`
      # is removed from the Test step and any new failure blocks the merge.
      # Build is also required (it validates the published bundle compiles).
      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
        env:
          # tsup bundles a large dependency graph into dist/cli.mjs; macOS +
          # Windows runners hit V8 heap exhaustion (~2GB) with default sizing.
          NODE_OPTIONS: --max-old-space-size=4096

  # ADR-010 — byte-identical dist/ outputs from the same commit.
  # Runs on push-to-main only (PR builds get the standard build matrix;
  # main-bound merges additionally get reproducibility).
  reproducible-build:
    name: Reproducibility check
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build twice and diff dist/
        env:
          NODE_OPTIONS: --max-old-space-size=4096
        run: |
          pnpm build
          mv dist dist-first
          pnpm build
          diff -r dist-first dist

      - name: Upload first build on diff failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: dist-first
          path: dist-first
