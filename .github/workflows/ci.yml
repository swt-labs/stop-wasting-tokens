name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.os }} / Node ${{ matrix.node }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      # Typecheck is required as of v1.5.2 Phase 01.
      # Lint is required as of v1.5.2 Phase 02.
      # Format check and Test remain advisory until v1.5.2 Phase 03 lands.
      # Build is also required (it validates the published bundle compiles).
      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Format check
        continue-on-error: true
        run: pnpm format:check

      - name: Test
        continue-on-error: true
        run: pnpm test

      - name: Build
        run: pnpm build
