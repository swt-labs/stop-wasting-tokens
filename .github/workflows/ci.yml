name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.os }} / Node ${{ matrix.node }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      # Quality gates marked continue-on-error are pre-existing v1.0 DEV-1D
      # carryforward (documented in the v1.5.1 archive's pre_existing_issues).
      # They surface findings in the run log without blocking CI until a
      # dedicated tech-debt milestone lands. Build is the only required gate
      # (it validates that the published bundle actually compiles).
      - name: Typecheck
        continue-on-error: true
        run: pnpm typecheck

      - name: Lint
        continue-on-error: true
        run: pnpm lint

      - name: Format check
        continue-on-error: true
        run: pnpm format:check

      - name: Test
        continue-on-error: true
        run: pnpm test

      - name: Build
        run: pnpm build
