name: install-smoke

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Published version to verify (without leading v)'
        required: true
        default: '0.1.0-alpha'

jobs:
  smoke:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'push' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        manager: [npm, pnpm, bun]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Resolve version under test
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          elif [ "${{ github.event_name }}" = "push" ]; then
            REF="${{ github.ref_name }}"
            VERSION="${REF#v}"
          else
            # Triggered by Release workflow — read root package.json
            VERSION=$(node -e "console.log(require('./package.json').version)")
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Verifying v${VERSION}"

      - name: Install via ${{ matrix.manager }}
        shell: bash
        run: |
          case "${{ matrix.manager }}" in
            npm)
              npm install -g stop-wasting-tokens@${{ steps.version.outputs.version }}
              ;;
            pnpm)
              npm install -g pnpm
              # Fresh CI runners don't have pnpm's global bin on PATH yet.
              # `pnpm setup` only writes to shell rc files (no use across
              # job steps), and `pnpm add -g` refuses to install a bin
              # whose target dir isn't already on PATH. Set PNPM_HOME
              # explicitly per OS, mkdir, export both PATH (for this step)
              # and GITHUB_PATH (for "Verify install").
              if [[ "${RUNNER_OS}" == "macOS" ]]; then
                PNPM_HOME="${HOME}/Library/pnpm"
              else
                PNPM_HOME="${HOME}/.local/share/pnpm"
              fi
              # pnpm's global *bin* lives at $PNPM_HOME/bin (not at the
              # config root). Both must exist before `pnpm add -g`, and
              # the bin dir must be on PATH for the same step.
              PNPM_BIN="${PNPM_HOME}/bin"
              mkdir -p "${PNPM_BIN}"
              export PNPM_HOME
              export PATH="${PNPM_BIN}:${PATH}"
              echo "PNPM_HOME=${PNPM_HOME}" >> "${GITHUB_ENV}"
              echo "${PNPM_BIN}" >> "${GITHUB_PATH}"
              pnpm add -g stop-wasting-tokens@${{ steps.version.outputs.version }}
              ;;
            bun)
              curl -fsSL https://bun.sh/install | bash
              echo "$HOME/.bun/bin" >> "$GITHUB_PATH"
              "$HOME/.bun/bin/bun" add -g stop-wasting-tokens@${{ steps.version.outputs.version }}
              ;;
          esac

      - name: Verify install
        shell: bash
        run: bash scripts/verify-install.sh ${{ steps.version.outputs.version }}
