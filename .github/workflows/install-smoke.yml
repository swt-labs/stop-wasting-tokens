name: install-smoke

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Published version to verify (without leading v)'
        required: true
        default: '0.1.0-alpha'

jobs:
  smoke:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'push' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        manager: [npm, pnpm, bun]

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        if: matrix.manager == 'pnpm'
        with:
          # No `version:` here — the action picks pnpm from the
          # `packageManager` field in root package.json (currently
          # pnpm@9.12.0). Specifying it twice would error with
          # ERR_PNPM_BAD_PM_VERSION.
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Resolve version under test
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          elif [ "${{ github.event_name }}" = "push" ]; then
            REF="${{ github.ref_name }}"
            VERSION="${REF#v}"
          else
            # Triggered by Release workflow — read root package.json
            VERSION=$(node -e "console.log(require('./package.json').version)")
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Verifying v${VERSION}"

      - name: Install via ${{ matrix.manager }}
        shell: bash
        run: |
          case "${{ matrix.manager }}" in
            npm)
              npm install -g stop-wasting-tokens@${{ steps.version.outputs.version }}
              ;;
            pnpm)
              # `pnpm/action-setup@v4` (above, gated on matrix.manager
              # == 'pnpm') has already wired PNPM_HOME + the bin path
              # onto PATH for this step and into GITHUB_PATH for the
              # subsequent "Verify install" step. We just install.
              pnpm add -g stop-wasting-tokens@${{ steps.version.outputs.version }}
              ;;
            bun)
              curl -fsSL https://bun.sh/install | bash
              echo "$HOME/.bun/bin" >> "$GITHUB_PATH"
              "$HOME/.bun/bin/bun" add -g stop-wasting-tokens@${{ steps.version.outputs.version }}
              ;;
          esac

      - name: Verify install
        shell: bash
        run: bash scripts/verify-install.sh ${{ steps.version.outputs.version }}
