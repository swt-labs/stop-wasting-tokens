name: install-smoke

# This workflow is called as a reusable workflow by `release.yml` after the
# publish job succeeds (see release.yml's `smoke` job with `needs: publish`).
# Running it as a downstream job of the same workflow eliminates the race
# we used to have when both workflows shared a `push: tags` trigger and
# raced for npm — install-smoke would hit ERR_PNPM_NO_MATCHING_VERSION
# against a tarball that hadn't been published yet.
#
# The `workflow_dispatch` trigger is preserved for ad-hoc verification
# against an already-published version (e.g. a historical tag whose
# install-smoke run failed for unrelated reasons).

on:
  workflow_call:
    inputs:
      version:
        description: 'Published version to verify (with or without leading v)'
        required: true
        type: string
  workflow_dispatch:
    inputs:
      version:
        description: 'Published version to verify (with or without leading v)'
        required: true
        default: '3.0.0-alpha.1'
        type: string

jobs:
  smoke:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        manager: [npm, pnpm, bun]

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        if: matrix.manager == 'pnpm'
        with:
          # No `version:` here — the action picks pnpm from the
          # `packageManager` field in root package.json (currently
          # pnpm@9.12.0). Specifying it twice would error with
          # ERR_PNPM_BAD_PM_VERSION.
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Resolve version under test
        id: version
        shell: bash
        run: |
          # Defensive strip of leading "v" so callers can pass either a tag
          # name (v3.0.0-alpha.1) or a bare semver (3.0.0-alpha.1).
          VERSION="${{ inputs.version }}"
          VERSION="${VERSION#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Verifying v${VERSION}"

      - name: Install via ${{ matrix.manager }}
        shell: bash
        run: |
          case "${{ matrix.manager }}" in
            npm)
              npm install -g stop-wasting-tokens@${{ steps.version.outputs.version }}
              ;;
            pnpm)
              # `pnpm/action-setup@v4` (above, gated on matrix.manager
              # == 'pnpm') has already wired PNPM_HOME + the bin path
              # onto PATH for this step and into GITHUB_PATH for the
              # subsequent "Verify install" step. We just install.
              pnpm add -g stop-wasting-tokens@${{ steps.version.outputs.version }}
              ;;
            bun)
              curl -fsSL https://bun.sh/install | bash
              echo "$HOME/.bun/bin" >> "$GITHUB_PATH"
              "$HOME/.bun/bin/bun" add -g stop-wasting-tokens@${{ steps.version.outputs.version }}
              ;;
          esac

      - name: Verify install
        shell: bash
        run: bash scripts/verify-install.sh ${{ steps.version.outputs.version }}
