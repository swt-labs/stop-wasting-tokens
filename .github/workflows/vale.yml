name: vale

on:
  pull_request:
    paths:
      - 'docs/**'
      - '.github/workflows/vale.yml'
  push:
    branches: ['main']
    paths:
      - 'docs/**'
      - '.github/workflows/vale.yml'

jobs:
  vale:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Vale
        run: |
          VALE_VERSION="3.7.0"
          curl -sL "https://github.com/errata-ai/vale/releases/download/v${VALE_VERSION}/vale_${VALE_VERSION}_Linux_64-bit.tar.gz" \
            | sudo tar -xzC /usr/local/bin vale
          vale --version

      - name: Sync Vale style packages
        run: |
          cd docs
          # If styles/Microsoft and styles/write-good are not committed,
          # vale sync downloads them. If they are, this is a no-op.
          if [ ! -d styles/Microsoft ] || [ ! -d styles/write-good ]; then
            vale sync
          fi

      - name: Lint docs prose
        # Per docs/decisions/STYLE-GUIDE.md: Vale alerts are advisory and do
        # not fail CI. The Vale.Terms / Vale.Spelling built-in rules fire at
        # error-level on project vocabulary (SWT, VBW, Zod, npm capitalization,
        # etc.) and on Mintlify .mdx prose that was never groomed for prose
        # discipline; the violations are surfaced for reviewers + operators
        # but do not block the merge.
        continue-on-error: true
        run: |
          cd docs
          vale --output=line .

      - name: Build docs site (Mintlify)
        # Best-effort in CI until a live docs deployment exists. Newer Mintlify
        # CLI releases have dropped the `build` subcommand, which made this
        # step a hard fail even though the comment + intent were "non-fatal."
        # The shell || fallback was unreliable across runners.
        continue-on-error: true
        run: pnpm --filter @swt-labs/docs build

      - name: Run docs structure tests
        # The docs structure tests depend on the Mintlify build output. Until
        # the Mintlify build is wired up (post-v3.0), keep them advisory.
        continue-on-error: true
        run: pnpm --filter @swt-labs/docs test
