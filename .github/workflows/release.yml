name: Release

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    name: Version Packages or Publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          # Node 24 ships npm 11.x, which has the Trusted Publisher OIDC
          # publish flow (token exchange + registry PUT auth). Node 22
          # ships npm 10.x — provenance signing works but the OIDC publish
          # auth doesn't, so the registry PUT 404s after sigstore stamps.
          node-version: 24
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Create Release Pull Request or Publish to npm
        id: changesets
        uses: changesets/action@v1
        with:
          publish: pnpm run release
          version: pnpm run version
          commit: 'chore(release): version packages'
          title: 'chore(release): version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No NPM_TOKEN — auth happens via npm Trusted Publisher (OIDC)
          # configured at https://www.npmjs.com/package/stop-wasting-tokens/access.
          # The id-token: write permission above lets `npm publish` pick up
          # the GitHub Actions runtime OIDC token and exchange it with npm's
          # registry for an ephemeral publish authorization tied to this
          # exact workflow path. Setting NPM_TOKEN would override OIDC and
          # fall back to token auth — which the package now rejects per
          # "disallow tokens (recommended)".
          NPM_CONFIG_PROVENANCE: 'true'
