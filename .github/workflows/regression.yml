name: Regression

# v3 regression suite — runs the `diff-artefacts` allowed-drift comparator
# (25 unit tests, active today) + the `ref-fastapi` byte-identical
# golden-bundle replay assertion per TDD2 §14.6 (cassette-deferred —
# activates when Anthropic cassettes + the v2.3.5 baseline are recorded).
# `pnpm test:regression` runs vitest against `test/regression/` and exits
# with vitest's status.

on:
  pull_request:
    paths:
      - 'packages/**'
      - 'test/regression/**'
      - 'packages/test-utils/golden/**'
      - 'packages/test-utils/cassettes/**'
  push:
    branches: ['main']

jobs:
  regression:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Run regression suite
        run: pnpm test:regression

      - name: Upload diff report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: regression-diff
          path: test/regression/output/diff-report.html
        continue-on-error: true # report file may not exist yet at M1
