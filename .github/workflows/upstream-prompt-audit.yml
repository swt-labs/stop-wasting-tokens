name: Upstream Drift

# Detects drift between SWT's overlay citations and the current upstream
# artifacts (Codex CLI base prompt, AGENTS.md spec, apply_patch.lark grammar,
# Claude Agent SDK type surface). Sources enumerated via `swt provider-
# tuning-sources` — a single source of truth driven by
# `pack.upstreamSources()` (Plan 05-01).
# Detection-only — opens a GitHub Issue on drift; does NOT auto-PR.
#
# Cadence: weekly (Monday 06:00 UTC) per Plan 05-01 brief. Adding new
# watched upstreams is a one-place change in the orchestration pack;
# this workflow + the audit script pick them up automatically.

on:
  schedule:
    - cron: '0 6 * * 1' # weekly, Monday 06:00 UTC
  workflow_dispatch: {} # manual trigger from Actions tab

permissions:
  issues: write # create + close + comment on drift issues
  contents: read # checkout repo + baseline files

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node (for pnpm + npm view)
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build SWT
        run: pnpm build

      - name: Run drift audit
        id: audit
        run: |
          set -euo pipefail
          set +e
          # pnpm exec puts the workspace bin on PATH for this run, so the
          # audit script can invoke `swt provider-tuning-sources` directly.
          REPORT=$(pnpm exec bash scripts/audit-upstream-prompts.sh --verify 2>&1)
          AUDIT_RC=$?
          set -e
          if [ "$AUDIT_RC" -ne 0 ]; then
            echo "::error::audit-upstream-prompts.sh exited $AUDIT_RC"
            echo "$REPORT"
            exit 1
          fi
          if [ -n "$REPORT" ]; then
            echo "drift_detected=true" >> "$GITHUB_OUTPUT"
            {
              echo "report<<EOF"
              echo "$REPORT"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          else
            echo "drift_detected=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Open drift issue
        if: steps.audit.outputs.drift_detected == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const today = new Date().toISOString().slice(0, 10);
            const title = `[Upstream Drift] Provider tuning pack source audit — ${today}`;
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;
            const report = `${{ steps.audit.outputs.report }}`;
            const body = [
              `Drift detected by weekly Upstream Drift audit (see [run](${runUrl})).`,
              ``,
              `Each \`DRIFT:\` line cites the source description, owning pack, method (\`upstreamSources\`),`,
              `baseline hash (8-char prefix), current hash (8-char prefix), and upstream URL.`,
              ``,
              '```',
              report,
              '```',
              ``,
              `Maintainer response procedure: see [provider_overlays/README.md](../blob/main/provider_overlays/README.md#upstream-drift-audit).`,
              ``,
              `tl;dr: review the diff context upstream, decide whether the overlays / pack metadata need updating, then run \`bash scripts/audit-upstream-prompts.sh --update\` locally to refresh the baseline and close this issue.`,
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['upstream-drift', 'audit'],
            });

      - name: Close prior drift issue on clean
        if: steps.audit.outputs.drift_detected == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;
            const open = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'upstream-drift',
            });
            for (const issue of open.data) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `Subsequent audit run is clean — no drift detected. Closing. (See [run](${runUrl}).)`,
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
              });
            }
