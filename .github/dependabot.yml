version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    groups:
      typescript-stack:
        patterns:
          - 'typescript'
          - '@typescript-eslint/*'
          - 'tsup'
          - 'tsx'
      eslint-stack:
        patterns:
          - 'eslint'
          - 'eslint-*'
          - 'prettier'
          - 'prettier-*'
      vitest-stack:
        patterns:
          - 'vitest'
          - '@vitest/*'

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
