# Vale prose-linter configuration per Plan 06-01 PR-52.
#
# Catches the most common doc regressions before they ship to operators:
#   - Inconsistent terminology (e.g., "Pi" vs "pi-coding-agent")
#   - Wordy phrasing (passive voice, weasel words)
#   - Spelling drift across docs/decisions/operations/cli folders
#
# Run locally:
#   vale --config=.vale.ini docs/
#
# Vale is operator-installed (not bundled with SWT). The CI integration is
# user-driven release ops; this file ships the canonical config so
# operators get consistent linting whether they run it locally, in
# editor, or in CI.

StylesPath = .vale/styles
MinAlertLevel = suggestion

# Built-in styles. write-good catches passive voice + wordiness;
# Microsoft style catches sentence-level clarity issues. Both are
# permissive by default — Vale's "suggestion" level just surfaces
# advice, not failures.
Packages = write-good, Microsoft

# Markdown is the canonical doc format. We scope Vale to user-facing
# docs only — TDD2.md is operator-authoritative and lives separately;
# the planning artefacts under .vbw-planning/ are gitignored.
[*.md]
BasedOnStyles = write-good, Microsoft

# Allowed jargon — SWT-specific terms that would otherwise trip
# Microsoft style's "complex word" or "obscure abbreviation" rules.
# These are project vocabulary, not weasel words.
Microsoft.ComplexWords = NO
Microsoft.Adverbs = NO

# Skip the changelog: per-PR entries are necessarily technical + dense,
# and prose-linting them would flag every commit.
[CHANGELOG.md]
BasedOnStyles =

# Skip the auto-generated reference docs: they're regenerated from
# scripts/docs-gen.ts and reflect the CLI surface verbatim.
[docs/reference/*]
BasedOnStyles =

# Skip the public-benchmark sample table — synthetic numbers + tables
# don't benefit from prose linting.
[docs/public-benchmark/*]
BasedOnStyles =
