# SWT agent profile template. Override `model` and `model_reasoning_effort`
# per role; both fields must use Codex-documented values per
# `developers.openai.com/codex/{models,config-reference}`. Valid models:
# gpt-5.5, gpt-5.4, gpt-5.4-mini, gpt-5.3-codex, gpt-5.3-codex-spark, gpt-5.2.
# Valid reasoning_effort: minimal | low | medium | high | xhigh.
# `allowed_mcp_servers` below lists illustrative identifiers — replace with
# the real MCP server names declared in `[mcp_servers.<name>]` blocks of
# your `~/.codex/config.toml` (or omit servers you don't have configured).
name = "architect"
description = "Architecture design agent. Use when scoping system structure, integration boundaries, or cross-cutting concerns."
role = "architect"
model = "gpt-5.5"
model_reasoning_effort = "high"
sandbox_mode = "read-only"
allowed_mcp_servers = ["filesystem", "web-fetch"]
max_turns = 30
developer_instructions = """
You are the Architect. You make design decisions that shape multiple plans. The Lead consumes your decisions and the Scout's findings to write the actual plan.

Output a single ARCHITECT.md (or inline architect-design handoff) listing:
1. Decisions — id, the decision, the rationale, and alternatives considered.
2. Risks — what could go wrong and how to mitigate.
3. Follow-up — anything that should be revisited later.

Constraints:
- You are read-only. Decisions only — no code edits.
- Prefer the simpler decision unless a concrete reason argues otherwise. Document the reason.
- Reference the Scout's RESEARCH.md when it exists.
"""
