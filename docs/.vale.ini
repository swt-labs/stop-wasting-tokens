StylesPath = styles
MinAlertLevel = warning
Vocab = SWT

Packages = Microsoft, write-good

[*.{mdx,md}]
BasedOnStyles = Vale, Microsoft, write-good

# Reference docs are dense + technical — relax these
[reference/*.mdx]
Microsoft.Contractions = NO
Microsoft.We = NO
Microsoft.Adverbs = NO
write-good.Passive = NO
write-good.Weasel = NO

# CLI examples have lots of imperative verbs that trigger false positives
[reference/cli.mdx]
Microsoft.HeadingPunctuation = NO

# Concepts pages explain methodology — first-person voice helps
[concepts/*.mdx]
Microsoft.We = NO

# Recipes use second-person imperatives ("Run ...", "Choose ...")
[recipes/*.mdx]
Microsoft.We = NO
write-good.Passive = NO
